name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install deps
      run: |
        cd backend
        pip install -r requirements.txt

    - name: Lint check
      run: |
        pip install flake8
        flake8 backend